kind = "web"
previewPath = "/"
title = "School Report Card System"
version = "1.0.0"
id = "artifacts/school-report"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22739

[services.development]
run = "pnpm --filter @workspace/school-report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-report", "run", "build" ]
serve = "static"
publicDir = "artifacts/school-report/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22739"
BASE_PATH = "/"
